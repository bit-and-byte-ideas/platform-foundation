name: OpenTofu Apply

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  PLAN_BLOB_ACCOUNT: bitbyteideasinfratfstate
  PLAN_BLOB_CONTAINER: platform-foundation

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stacks/azure/platform-foundation

    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve merged PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'main',
              per_page: 10,
            });
            const merged = prs.find(pr => pr.merge_commit_sha === context.sha);
            if (!merged) {
              core.setFailed(`No merged PR found matching merge commit ${context.sha}`);
              return;
            }
            core.setOutput('number', String(merged.number));
            core.setOutput('head_sha', merged.head.sha);

      - name: Download plan from blob storage
        run: |
          az storage blob download \
            --account-name "$PLAN_BLOB_ACCOUNT" \
            --container-name "$PLAN_BLOB_CONTAINER" \
            --name "plans/pr-${{ steps.pr.outputs.number }}/${{ steps.pr.outputs.head_sha }}/platform-foundation.tfplan" \
            --file tfplan \
            --auth-mode login

      - name: Init
        run: tofu init

      - name: Apply
        run: tofu apply -auto-approve tfplan
