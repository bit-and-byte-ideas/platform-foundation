name: OpenTofu Plan

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  PLAN_BLOB_ACCOUNT: bitbyteideasinfratfstate
  PLAN_BLOB_CONTAINER: platform-foundation

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stacks/azure/platform-foundation

    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Init
        run: tofu init

      - name: Plan
        run: tofu plan -out=tfplan 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee plan-output.txt

      - name: Upload plan to blob storage
        run: |
          az storage blob upload \
            --account-name "$PLAN_BLOB_ACCOUNT" \
            --container-name "$PLAN_BLOB_CONTAINER" \
            --name "plans/pr-${{ github.event.number }}/${{ github.event.pull_request.head.sha }}/platform-foundation.tfplan" \
            --file tfplan \
            --auth-mode login \
            --overwrite true

      - name: Post plan comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('stacks/azure/platform-foundation/plan-output.txt', 'utf8');
            const maxLen = 60000;
            const plan = raw.length > maxLen
              ? raw.slice(0, maxLen) + '\n\n_(output truncated)_'
              : raw;

            const marker = '<!-- tofu-plan -->';
            const body = [
              marker,
              '## OpenTofu Plan',
              `**Commit:** \`${{ github.event.pull_request.head.sha }}\``,
              '',
              '<details><summary>Expand plan</summary>',
              '',
              '```diff',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const c of comments.filter(c => c.body.includes(marker))) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: c.id,
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
